<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Inline <style> is allowed under the default MV3 CSP; inline <script> is
         not, so this popup is intentionally script-free. -->
    <style>
      :root {
        --blue: #2f8fff;
        --blue-deep: #1f73e6;
        --ink: #0f1b2d;
        --muted: #5b6b82;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 290px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: #fff;
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px;
        background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
        color: #fff;
      }
      header img { width: 36px; height: 36px; border-radius: 9px; }
      header h1 { font-size: 16px; margin: 0; letter-spacing: -0.2px; }
      header p { font-size: 11px; margin: 2px 0 0; opacity: 0.9; }
      .body { padding: 14px 16px 16px; }
      .body p { font-size: 13px; line-height: 1.5; color: var(--muted); margin: 0 0 12px; }
      .keys { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
      kbd {
        font: 600 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f1f5fb;
        border: 1px solid #dce4f0;
        border-bottom-width: 2px;
        border-radius: 6px;
        padding: 5px 7px;
        color: var(--ink);
      }
      a.btn {
        display: block;
        text-align: center;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        padding: 9px;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
      }
      a.btn:hover { background: #1c2c44; }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon48.png" alt="TabQ logo" />
      <div>
        <h1>TabQ</h1>
        <p>Numbered tab favicons</p>
      </div>
    </header>
    <div class="body">
      <p>
        Your first 9 tabs are badged 1-9 on their favicon, so you can see at a
        glance where these jump shortcuts will land:
      </p>
      <div class="keys">
        <kbd>Ctrl/&#8984; 1</kbd>
        <kbd>2</kbd>
        <kbd>3</kbd>
        <kbd>4</kbd>
        <kbd>5</kbd>
        <kbd>6</kbd>
        <kbd>7</kbd>
        <kbd>8</kbd>
        <kbd>9</kbd>
      </div>
      <a class="btn" href="https://github.com/thisisdkyadav/tabq" target="_blank" rel="noopener">
        View on GitHub &#8599;
      </a>
    </div>
  </body>
</html>
